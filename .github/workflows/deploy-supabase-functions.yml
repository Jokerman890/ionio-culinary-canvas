name: Deploy Supabase Edge Functions

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-supabase-functions-production
  cancel-in-progress: false

jobs:
  deploy-functions:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      SUPABASE_PROJECT_REF: mfhjnxzleewxzglkbjnz
      SUPABASE_FUNCTION_URL: https://mfhjnxzleewxzglkbjnz.supabase.co/functions/v1/login-rate-limited
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Supabase CLI
        run: |
          npm install -g supabase@2.77.0
          supabase --version

      - name: Verify Supabase config
        run: |
          set -euo pipefail
          grep -q 'project_id = "mfhjnxzleewxzglkbjnz"' supabase/config.toml

      - name: Verify required secret exists
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "Missing repository secret: SUPABASE_ACCESS_TOKEN" >&2
            echo "Create it in GitHub: Settings -> Secrets and variables -> Actions -> New repository secret." >&2
            exit 1
          fi
          echo "SUPABASE_ACCESS_TOKEN is configured."

      - name: Deploy Edge Functions
        run: |
          set -euo pipefail
          supabase functions deploy login-rate-limited --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy verify-admin --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy manage-users --project-ref "$SUPABASE_PROJECT_REF"

      - name: Verify production CORS
        id: cors_prod
        run: |
          set -euo pipefail
          curl -fsSi -X OPTIONS "$SUPABASE_FUNCTION_URL" \
            -H "Origin: https://ionio-ganderkesee.de" \
            -o /tmp/cors-prod.headers

          if ! grep -qi '^access-control-allow-origin: https://ionio-ganderkesee.de' /tmp/cors-prod.headers; then
            echo "Expected production CORS origin was not returned." >&2
            cat /tmp/cors-prod.headers >&2
            exit 1
          fi

          echo "result=passed" >> "$GITHUB_OUTPUT"

      - name: Verify www CORS
        id: cors_www
        run: |
          set -euo pipefail
          curl -fsSi -X OPTIONS "$SUPABASE_FUNCTION_URL" \
            -H "Origin: https://www.ionio-ganderkesee.de" \
            -o /tmp/cors-www.headers

          if ! grep -qi '^access-control-allow-origin: https://www.ionio-ganderkesee.de' /tmp/cors-www.headers; then
            echo "Expected www CORS origin was not returned." >&2
            cat /tmp/cors-www.headers >&2
            exit 1
          fi

          echo "result=passed" >> "$GITHUB_OUTPUT"

      - name: Smoke test method handling
        id: smoke
        run: |
          set -euo pipefail

          get_status="$(curl -sS -o /tmp/get.out -w "%{http_code}" \
            -X GET "$SUPABASE_FUNCTION_URL" \
            -H "Origin: https://ionio-ganderkesee.de")"

          if [ "$get_status" != "405" ]; then
            echo "Expected GET to return 405, got $get_status." >&2
            cat /tmp/get.out >&2
            exit 1
          fi

          post_status="$(curl -sS -o /tmp/post.out -w "%{http_code}" \
            -X POST "$SUPABASE_FUNCTION_URL" \
            -H "Origin: https://ionio-ganderkesee.de" \
            -H "Content-Type: application/json" \
            -d '{}')"

          if [ "$post_status" != "400" ]; then
            echo "Expected empty POST to return 400, got $post_status." >&2
            cat /tmp/post.out >&2
            exit 1
          fi

          echo "get_status=$get_status" >> "$GITHUB_OUTPUT"
          echo "post_status=$post_status" >> "$GITHUB_OUTPUT"

      - name: Deployment summary
        run: |
          {
            echo "## Supabase Edge Functions Deploy"
            echo
            echo "Deployed functions:"
            echo "- login-rate-limited"
            echo "- verify-admin"
            echo "- manage-users"
            echo
            echo "CORS verification:"
            echo "- Production origin: ${{ steps.cors_prod.outputs.result }}"
            echo "- WWW origin: ${{ steps.cors_www.outputs.result }}"
            echo
            echo "Smoke tests:"
            echo "- GET returned: ${{ steps.smoke.outputs.get_status }}"
            echo "- Empty POST returned: ${{ steps.smoke.outputs.post_status }}"
            echo
            echo "No secrets were printed by this workflow."
          } >> "$GITHUB_STEP_SUMMARY"
