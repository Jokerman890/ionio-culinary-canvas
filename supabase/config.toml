# Supabase project binding
# NOTE: keep a single project_id here to avoid drift between local/stage/prod.
# If you use staging, manage it via separate branches/config, not per-function project_id.
project_id = "uuohpodkgblvjrhvfldl"

[functions.verify-admin]
# JWT validation happens in code via getUser() — gateway verify must be off for ES256 tokens.
verify_jwt = false

[functions.login-rate-limited]
# This endpoint is used before login → no JWT available.
verify_jwt = false

[functions.manage-users]
# Admin-only user management → require a valid JWT.
verify_jwt = true
